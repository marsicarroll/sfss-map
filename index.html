<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SFSS Circulation Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([45, -60], 3);

Promise.all([
    fetch('./backgroundexport_simp.geojson').then(r => r.json()),
    fetch('./SFSSlocationsexport.geojson').then(r => r.json()),
    fetch('./SFSSlinesexport.geojson').then(r => r.json())
]).then(([background, locations, lines]) => {

    L.geoJSON(background, {
        style: {
            color: "#666",
            weight: 1,
            fillOpacity: 0
        }
    }).addTo(map);

    L.geoJSON(lines, {
        style: {
            color: "#cc0000",
            weight: 2
        }
    }).addTo(map);

    L.geoJSON(locations, {
        pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, {
                radius: 5
            });
        }
    }).addTo(map);

});

</script>

</body>
</html>
