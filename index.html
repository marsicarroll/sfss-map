<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SFSS Circulation Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100vh;
}
    
#controls {
    position: relative;
    z-index: 1000;
    padding: 10px;
    background: white;
}

#controls button {
    margin-right: 5px;
}

#map {
    width: 100%;
    height: calc(100vh - 60px);
}
</style>
</head>

<body>

<div id="controls">
<button onclick="showIssue(0)">All</button>
<button onclick="showIssue(1)">Issue 1</button>
<button onclick="showIssue(2)">Issue 2</button>
<button onclick="showIssue(3)">Issue 3</button>
<button onclick="showIssue(4)">Issue 4</button>
<button onclick="showIssue(5)">Issue 5</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([45, -60], 3);

Promise.all([
    fetch('./backgroundexport_simp.geojson').then(r => r.json()),
    fetch('./SFSSlocationsexport.geojson').then(r => r.json()),
    fetch('./SFSSlinesexport.geojson').then(r => r.json())
]).then(([background, locations, lines]) => {

    L.geoJSON(background, {
        style: {
            color: "#666",
            weight: 1,
            fillOpacity: 0
        }
    }).addTo(map);

window.linesData = lines;

let submissionLayer;
let distributionLayer;

window.showIssue = function(issueNum) {

    if (lineLayer) {
        map.removeLayer(lineLayer);
    }

if (submissionLayer) {
    map.removeLayer(submissionLayer);
}

if (distributionLayer) {
    map.removeLayer(distributionLayer);
}

submissionLayer = L.geoJSON(window.linesData, {

    filter: function(feature) {

        if (Number(feature.properties.issue) !== issueNum) {
            return false;
        }

        return feature.properties.type === "submission";
    },

    style: {
        color: "blue",
        weight: 2
    }

}).addTo(map);

setTimeout(function() {

    distributionLayer = L.geoJSON(window.linesData, {

        filter: function(feature) {

            if (Number(feature.properties.issue) !== issueNum) {
                return false;
            }

            return feature.properties.type === "distribution";
        },

        style: {
            color: "red",
            weight: 2
        }

    }).addTo(map);

}, 1000);
};

showIssue(0);

    L.geoJSON(locations, {
        pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, {
                radius: 5
            });
        }
    }).addTo(map);

});

</script>

</body>
</html>
